<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenova — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0f1e45;
      --navy-mid:  #1a3166;
      --blue:      #2d5be3;
      --blue-lt:   #e8eeff;
      --accent:    #3d6ff8;
      --bg:        #f0f3ff;
      --card:      #ffffff;
      --text:      #0f1e45;
      --muted:     #8492b4;
      --border:    #dde3f5;
      --shadow:    0 24px 64px rgba(15,30,69,.10), 0 4px 16px rgba(45,91,227,.08);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── decorative blobs ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #a8bfff 0%, #c7d6ff 60%, transparent 100%);
      top: -160px; left: -160px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #cfd9ff 0%, #e0e8ff 60%, transparent 100%);
      bottom: -120px; right: -120px;
    }

    /* dots grid */
    .dots {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      display: grid;
      gap: 10px;
    }
    .dots span {
      width: 3px; height: 3px;
      background: var(--blue);
      border-radius: 50%;
      opacity: .18;
      display: block;
    }
    .dots.tl { top: 160px; left: 40px; grid-template-columns: repeat(5, 1fr); }
    .dots.br { bottom: 200px; right: 40px; grid-template-columns: repeat(5, 1fr); }

    /* ── page layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 20px;
    }

    /* ── header ── */
    .header {
      text-align: center;
      animation: fadeUp .6s ease both;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 52px; height: 52px;
    }
    .logo-name {
      font-family: 'Sora', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -.5px;
    }
    .tagline {
      font-size: .875rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: .01em;
    }

    /* trust badge */
    .trust-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.7);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: .8rem;
      color: var(--navy-mid);
      font-weight: 500;
      backdrop-filter: blur(8px);
      animation: fadeUp .6s .1s ease both;
    }
    .trust-badge svg { flex-shrink: 0; }

    /* ── card ── */
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      animation: fadeUp .65s .15s ease both;
      border: 1px solid rgba(255,255,255,.8);
    }

    /* lock icon */
    .lock-wrap {
      width: 64px; height: 64px;
      background: var(--blue-lt);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    .card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .card-sub {
      text-align: center;
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* fields */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap .icon {
      position: absolute;
      left: 14px;
      color: var(--muted);
      pointer-events: none;
      display: flex;
    }
    .input-wrap input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--navy);
      background: #fafbff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,111,248,.12);
      background: #fff;
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      padding: 0;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--navy); }

    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 20px;
    }
    .forgot a {
      font-size: .8rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      transition: opacity .2s;
    }
    .forgot a:hover { opacity: .75; }

    /* buttons */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: .01em;
      transition: transform .18s, box-shadow .18s, background .18s;
      box-shadow: 0 4px 16px rgba(15,30,69,.25);
    }
    .btn-primary:hover {
      background: var(--navy-mid);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(15,30,69,.3);
    }
    .btn-primary:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .08em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 14px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--navy);
      transition: border-color .2s, box-shadow .2s, transform .18s;
    }
    .btn-google:hover {
      border-color: #aab4d4;
      box-shadow: 0 4px 12px rgba(15,30,69,.08);
      transform: translateY(-1px);
    }

    .signup-row {
      text-align: center;
      margin-top: 24px;
      font-size: .875rem;
      color: var(--muted);
    }
    .signup-row a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: opacity .2s;
    }
    .signup-row a:hover { opacity: .75; }

    /* ── footer bits ── */
    .secure-note {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .78rem;
      color: var(--muted);
      animation: fadeUp .6s .3s ease both;
    }
    .footer-copy {
      font-size: .75rem;
      color: #b5bdd8;
      animation: fadeUp .6s .35s ease both;
    }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- decorative dot grids -->
  <div class="dots tl">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="dots br">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="page">

    <!-- logo + tagline -->
    <div class="header">
      <div class="logo-wrap">
        <span class="logo-name">ZENOVA</span>
      </div>
      <p class="tagline">Master The Lekki Headmaster</p>
    </div>

    <!-- trust badge -->
    <div class="trust-badge">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2 4v4c0 3.3 2.5 6.4 6 7 3.5-.6 6-3.7 6-7V4L8 1.5z" fill="#2d5be3" opacity=".15" stroke="#2d5be3" stroke-width="1.2"/>
        <path d="M5.5 8l2 2 3-3" stroke="#2d5be3" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Trusted by students preparing for Literature exams
    </div>

    <!-- sign in card -->
    <div class="card">

      <div class="lock-wrap">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="6" y="13" width="16" height="12" rx="3" stroke="#2d5be3" stroke-width="1.8"/>
          <path d="M9 13V9a5 5 0 0 1 10 0v4" stroke="#2d5be3" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="14" cy="19" r="1.5" fill="#2d5be3"/>
        </svg>
      </div>

      <h1 class="card-title">Welcome Back</h1>
      <p class="card-sub">Sign in to continue your learning journey.</p>

      <!-- email -->
      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="Enter your email address" autocomplete="email" />
        </div>
      </div>

      <!-- password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          <button class="toggle-pw" type="button" aria-label="Toggle password" onclick="togglePw()">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M1 9s2.8-5 8-5 8 5 8 5-2.8 5-8 5-8-5-8-5z" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.3"/>
              <line x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" id="eye-slash" style="display:none"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot"><a href="#">Forgot password?</a></div>

      <button class="btn-primary" onclick="handleSignIn(this)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M7 9h8M11 5l4 4-4 4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 3H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Sign In
      </button>

      <div class="divider">OR</div>

      <button class="btn-google">
        <!-- Google G logo -->
        <svg width="20" height="20" viewBox="0 0 20 20">
          <path d="M19.6 10.23c0-.68-.06-1.36-.17-2H10v3.79h5.4a4.6 4.6 0 0 1-2 3.02v2.5h3.23c1.9-1.75 3-4.32 3-7.31z" fill="#4285F4"/>
          <path d="M10 20c2.7 0 4.97-.9 6.63-2.42l-3.23-2.5c-.9.6-2.04.96-3.4.96-2.6 0-4.8-1.76-5.59-4.13H1.1v2.57A10 10 0 0 0 10 20z" fill="#34A853"/>
          <path d="M4.41 11.91A5.97 5.97 0 0 1 4.1 10c0-.66.11-1.3.31-1.91V5.52H1.1A10 10 0 0 0 0 10c0 1.62.39 3.15 1.1 4.48l3.31-2.57z" fill="#FBBC05"/>
          <path d="M10 3.96c1.47 0 2.79.5 3.83 1.5l2.87-2.87A9.9 9.9 0 0 0 10 0 10 10 0 0 0 1.1 5.52l3.31 2.57C5.2 5.72 7.4 3.96 10 3.96z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="signup-row">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>

    </div>

    <!-- secure note -->
    <div class="secure-note">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L2 3.5v3.5c0 2.9 2.2 5.6 5 6.2 2.8-.6 5-3.3 5-6.2V3.5L7 1z" fill="#8492b4" opacity=".3" stroke="#8492b4" stroke-width="1"/>
        <path d="M4.5 7l2 2 3-3" stroke="#8492b4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Secure and private. Your data is protected.
    </div>

    <p class="footer-copy">© 2026 Zenova. All Rights Reserved.</p>

  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      const slash = document.getElementById('eye-slash');
      if (inp.type === 'password') {
        inp.type = 'text';
        slash.style.display = 'block';
      } else {
        inp.type = 'password';
        slash.style.display = 'none';
      }
    }

    function handleSignIn(btn) {
      const email = document.getElementById('email').value.trim();
      const pw    = document.getElementById('password').value;
      if (!email || !pw) {
        shake(btn);
        return;
      }
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'plan.html';
      }, 1800);
    }

    function shake(el) {
      el.style.animation = 'none';
      el.offsetWidth;
      el.style.animation = 'shake .4s ease';
    }

    const style = document.createElement('style');
    style.textContent = `@keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)}
    }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
