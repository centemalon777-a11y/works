<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zenova – Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#f0f2f8;color:#1e1e2e}
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── Mobile Header ── */
.mobile-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;border-bottom:1px solid #e4e7f0;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-text{font-size:20px;font-weight:800;color:#0f2166;letter-spacing:-0.5px}
.header-icons{display:flex;align-items:center;gap:10px}
.icon-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid #fff}
.avatar{width:36px;height:36px;border-radius:50%;background:#dde3f5;display:flex;align-items:center;justify-content:center}

/* ── Sidebar (hidden on mobile) ── */
.sidebar{display:none}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column}

/* ── Content ── */
.content{flex:1;padding:18px 16px 100px;display:flex;flex-direction:column;gap:16px}

/* ── Page Header ── */
.page-header{display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:20px;font-weight:800;color:#0f2166;letter-spacing:-0.3px}
.mark-read-btn{background:none;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;padding:6px 10px;border-radius:8px;transition:background .15s}
.mark-read-btn:hover{background:#e8eaf2;color:#0f2166}

/* ── Welcome Notification Card ── */
.notif-card{background:#fff;border-radius:16px;border:1px solid #e4e7f0;overflow:hidden;box-shadow:0 2px 12px rgba(15,33,102,.06);animation:slideUp .4s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Card top banner */
.notif-banner{background:linear-gradient(135deg,#0f2166 0%,#1e3a9f 100%);padding:20px 20px 22px;position:relative;overflow:hidden}
.notif-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.banner-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;position:relative;z-index:1}
.banner-icon-wrap{width:42px;height:42px;background:rgba(255,255,255,0.15);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;backdrop-filter:blur(4px)}
.unread-badge{background:#f59e0b;color:#7c2d12;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:20px;white-space:nowrap;height:fit-content}
.banner-title{font-size:18px;font-weight:800;color:#fff;line-height:1.25;position:relative;z-index:1;margin-bottom:5px}
.banner-sub{font-size:12px;color:rgba(255,255,255,.75);position:relative;z-index:1;line-height:1.5}

/* Card body */
.notif-body{padding:18px}

/* Section label */
.section-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;margin-bottom:12px}

/* Feature items */
.feat-list{display:flex;flex-direction:column;gap:0}
.feat-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #f3f4f8;cursor:pointer;transition:background .15s;border-radius:0;position:relative}
.feat-item:last-child{border-bottom:none}
.feat-item-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.feat-item-icon.blue{background:#e0e7ff}
.feat-item-icon.amber{background:#fef3c7}
.feat-item-icon.green{background:#dcfce7}
.feat-item-body{flex:1;min-width:0}
.feat-item-title{font-size:13.5px;font-weight:700;color:#1e1e2e;margin-bottom:2px}
.feat-item-sub{font-size:11.5px;color:#9ca3af;line-height:1.45}
.feat-item-arrow{color:#cbd5e1;flex-shrink:0}

/* CTA button */
.card-cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#0f2166;color:#fff;border:none;border-radius:11px;padding:13px 0;font-size:13.5px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:18px;transition:opacity .2s}
.card-cta:hover{opacity:.88}
.card-cta:active{opacity:.78;transform:scale(.98)}

/* divider */
.notif-divider{height:1px;background:#f0f2f8;margin:0 18px}

/* timestamp row */
.notif-footer{padding:12px 18px 16px;display:flex;align-items:center;justify-content:space-between}
.notif-time{font-size:11px;color:#c4c9d8;display:flex;align-items:center;gap:5px}
.notif-time-dot{width:5px;height:5px;background:#22c55e;border-radius:50%;flex-shrink:0}

/* ── Mobile Nav ── */
.mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e4e7f0;padding:10px 0 18px;z-index:100}
.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:10.5px;color:#9ca3af;font-weight:500;padding:4px 0;position:relative}
.mnav-btn.active{color:#0f2166;font-weight:700}
.mnav-notif-dot{position:absolute;top:2px;right:calc(50% - 14px);width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff}

/* Desktop topbar hidden on mobile */
.desktop-topbar{display:none}

/* ── Desktop Overrides ── */
@media(min-width:768px){
  .app{flex-direction:row;height:100vh;overflow:hidden}
  .mobile-header{display:none}
  .mobile-nav{display:none}

  .sidebar{display:flex;flex-direction:column;width:230px;background:#fff;border-right:1px solid #e4e7f0;height:100vh;flex-shrink:0}
  .sidebar-logo{padding:20px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f2f8}
  .sb-nav{padding:12px 10px;flex:1;overflow-y:auto}
  .sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 13px;border-radius:9px;border:none;cursor:pointer;font-size:13.5px;font-family:'Inter',sans-serif;font-weight:500;color:#6b7280;background:transparent;margin-bottom:2px;text-align:left;transition:background .15s,color .15s}
  .sb-btn:hover{background:#f5f6fb;color:#0f2166}
  .sb-btn.active{background:#0f2166;color:#fff;font-weight:700}
  .sb-premium{margin:12px;border-radius:14px;background:linear-gradient(145deg,#0f2166,#1e3a9f);padding:16px 15px;color:#fff}
  .sb-premium h4{font-size:14px;font-weight:700;margin-bottom:6px}
  .sb-premium p{font-size:11.5px;opacity:.82;line-height:1.55;margin-bottom:12px}

  .desktop-topbar{display:flex;align-items:center;justify-content:flex-end;padding:13px 28px;background:#fff;border-bottom:1px solid #e4e7f0;flex-shrink:0}

  .main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .content{padding:24px 28px 28px;gap:20px;overflow-y:auto;flex:1;display:block}
  .content>*{margin-bottom:20px}
  .content>*:last-child{margin-bottom:0}

  /* Constrain card width on desktop */
  .notif-card{max-width:540px}
}
</style>
</head>
<body>
<div class="app">

<!-- Mobile Header -->
<header class="mobile-header">
  <div class="logo-wrap">
    <svg width="32" height="32" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="87" stroke="#0f2166" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="462 92" stroke-dashoffset="46"/><polygon points="50,57 150,57 150,73 76,127 150,127 150,143 50,143 50,127 124,73 50,73" fill="#0f2166"/></svg>
    <span class="logo-text">Zenova</span>
  </div>
  <div class="header-icons">
    <button class="icon-btn" aria-label="Notifications" onclick="location.href='notifications.html'">
      <svg width="20" height="20" fill="none" stroke="#6b7280" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </button>
    <div class="avatar" onclick="location.href='settings.html'" style="cursor:pointer">
      <svg width="20" height="20" fill="none" stroke="#6b7280" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </div>
</header>

<!-- Sidebar (Desktop only) -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="36" height="36" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="87" stroke="#0f2166" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="462 92" stroke-dashoffset="46"/><polygon points="50,57 150,57 150,73 76,127 150,127 150,143 50,143 50,127 124,73 50,73" fill="#0f2166"/></svg>
    <span class="logo-text">Zenova</span>
  </div>
  <nav class="sb-nav">
    <button class="sb-btn" onclick="location.href='dashboard.html'"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.75L12 3l9 6.75V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.75z"/><path d="M9 21V12h6v9"/></svg>Home</button>
    <button class="sb-btn" onclick="location.href='chapters.html'"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Chapters</button>
    <button class="sb-btn" onclick="location.href='practice_question.html'"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>Audio Summaries</button>
    <button class="sb-btn" onclick="location.href='test1.html'"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>Practice Quizzes</button>
    <button class="sb-btn" onclick="location.href='chapters.html'"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Cast &amp; Characters</button>

  </nav>
  <div class="sb-premium">
    <h4>&#x1F451; Unlock Premium</h4>
    <p>Access all summaries, audios, quizzes, character analysis and revision materials.</p>
    <button style="width:100%;padding:9px 0;background:#f59e0b;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#7c2d12;cursor:pointer">Upgrade Now</button>
  </div>
</aside>

<!-- Main Content -->
<main class="main">

  <!-- Desktop Topbar -->
  <header class="desktop-topbar">
    <div class="header-icons">
      <button class="icon-btn" aria-label="Notifications" onclick="location.href='notifications.html'">
        <svg width="20" height="20" fill="none" stroke="#6b7280" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot"></span>
      </button>
      <div class="avatar" onclick="location.href='settings.html'" style="cursor:pointer">
        <svg width="20" height="20" fill="none" stroke="#6b7280" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
  </header>

  <div class="content">

    <!-- Page header -->
    <div class="page-header">
      <h1 class="page-title">Notifications</h1>
      <button class="mark-read-btn" onclick="markRead()">Mark all read</button>
    </div>

    <!-- Single notification card -->
    <div class="notif-card" id="notifCard">

      <!-- Banner -->
      <div class="notif-banner">
        <div class="banner-top">
          <div class="banner-icon-wrap">&#x1F389;</div>
          <span class="unread-badge">New</span>
        </div>
        <div class="banner-title">Welcome to Zenova!</div>
        <div class="banner-sub">You're all set to master <strong style="color:#fff;font-weight:700">The Lekki Headmaster</strong>.</div>
      </div>

    </div>

  </div>
</main>

<!-- Mobile Bottom Nav -->
<nav class="mobile-nav">
  <button class="mnav-btn" onclick="location.href='dashboard.html'">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.75L12 3l9 6.75V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.75z"/><path d="M9 21V12h6v9"/></svg>Home
  </button>
  <button class="mnav-btn" onclick="location.href='chapters.html'">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Chapters
  </button>
  <button class="mnav-btn" onclick="location.href='practice_question.html'">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>Audio
  </button>
  <button class="mnav-btn" onclick="location.href='test1.html'">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>Quiz
  </button>
  <button class="mnav-btn active" onclick="location.href='notifications.html'">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <span class="mnav-notif-dot" id="navDot"></span>
    Notifs
  </button>
</nav>

</div>

<script>
  function setSb(btn){
    document.querySelectorAll('.sb-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
  }
  function setMnav(btn){
    document.querySelectorAll('.mnav-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
  }
  function markRead(){
    const badge = document.querySelector('.unread-badge');
    const dot = document.getElementById('navDot');
    const headerDot = document.querySelector('.notif-dot');
    const time = document.querySelector('.notif-time');
    if(badge){ badge.textContent='Read'; badge.style.background='#d1fae5'; badge.style.color='#065f46'; }
    if(dot) dot.style.display='none';
    if(headerDot) headerDot.style.display='none';
    if(time) time.innerHTML='<span style="width:5px;height:5px;background:#9ca3af;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:5px"></span>Just now';
  }
  function startLearning(){
    alert('Opening Chapter 1 – The Arrival of Moses Johnson…');
  }
</script>
</body>
</html>
